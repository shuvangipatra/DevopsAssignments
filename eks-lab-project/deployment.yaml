apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-lab-deployment
  labels:
    app: eks-lab-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eks-lab-project
  template:
    metadata:
      labels:
        app: eks-lab-project
    spec:
      containers:
      - name: eks-lab-container
        image: <your-account-id>.dkr.ecr.ap-south-1.amazonaws.com/eks-lab-project:latest
        ports:
        - containerPort: 80
