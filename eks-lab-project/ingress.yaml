apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eks-lab-ingress
  annotations:
    kubernetes.io/ingress.class: alb
spec:
  rules:
  - host: soumitripathy.site
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: eks-lab-service
            port:
              number: 80
